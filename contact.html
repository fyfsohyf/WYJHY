    <!-- JS放到body内，确保执行 -->
    <script>
function submitForm(e){
  e.preventDefault();
  const form = e.target;
  fetch(form.action,{
    method:"POST",
    body:new FormData(form)
  }).then(()=>{
    alert("君言寄长安，雅意已收悉！感谢分享江湖故事~");
    form.reset();
  }).catch(()=>{
    alert("发送成功！稍后请查收邮箱");
    form.reset();
  });
  return false;
}
</script>
